<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRM Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>CRM / Client Management Dashboard</h1>

  <!-- Client List -->
  <section id="clients">
    <h2>Client List</h2>
    <ul id="clientList"></ul>
    <input type="text" id="newClient" placeholder="Add new client">
    <button onclick="addClient()">Add Client</button>
  </section>

  <!-- Lead Pipeline -->
  <section id="pipeline">
    <h2>Lead Pipeline</h2>
    <div id="pipelineStages">
      <div class="stage">🔵 New Lead</div>
      <div class="stage">🟢 Contacted</div>
      <div class="stage">🟡 Proposal Sent</div>
      <div class="stage">🔴 Closed</div>
    </div>
  </section>

  <!-- Tasks -->
  <section id="tasks">
    <h2>Tasks & Reminders</h2>
    <ul id="taskList"></ul>
    <input type="text" id="newTask" placeholder="Add new task">
    <button onclick="addTask()">Add Task</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
